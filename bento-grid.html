<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adventure Bento Grid</title>

  <style>
    
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f4f4;
    }

    main {
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(4, 250px);
      grid-template-rows: repeat(3, 200px);
      gap: 15px;
    }

   
    .tile {
      border-radius: 15px;
      overflow: hidden;
      position: relative;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    

    
    .tile-1 {
      grid-column: span 2;
      grid-row: span 2;
    }

    
    .tile-4 {
      grid-column: span 2;
    }

    
    .tile-6 {
      grid-row: span 2;
    }

    
    .text-tile {
      background-color: #2f5d50;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 20px;
      text-align: center;
    }

  </style>
</head>

<body>

<main>
  <section class="bento-grid">

   
    <div class="tile tile-1">
      <img src="images/mountain.png" alt="Mountain landscape at sunrise">
    </div>

    
    <div class="tile">
      <img src="images/hiking-trail.png" alt="Hiking trail in forest">
    </div>

   
    <div class="tile">
      <img src="images/camping.png" alt="Tent camping under the stars">
    </div>

    
    <div class="tile tile-4">
      <img src="images/lake.png" alt="Mountain lake view">
    </div>

    
    <div class="tile text-tile">
      Explore More.
    </div>

    
    <div class="tile tile-6">
      <img src="images/backpack.png" alt="Backpacker overlooking valley">
    </div>

  </section>
</main>

</body>
</html>
